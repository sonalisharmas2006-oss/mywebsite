<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN AGAIN</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section>
        <div class="login-box">
            <form>
                <h2>Login</h2>
                <div class="input-box">
                    <span class="icon"><ion-icon name="mail-outline"></ion-icon>
                    </span>
                    <input type="email" required>
                    <label>Email</label>
                </div>
                <div class="input-box">
                    <span class="icon"><ion-icon name="lock-closed-outline"></ion-icon>
                    </span>
                    <input type="password" required>
                    <label>Password</label>
                </div>
                <div class="remember-forgot">
                    <label><input type="checkbox">Remember Me</label>
                    <a href="forogotpassword.html">Forgot Password?</a>
                </div>
                <button type="submit" class="login-btn">Login</button>
                <div class="register-link">
                    <p>Don't have an account? <a href="register.html">Register</a></p>
                </div>
            </form>
        </div>
    </section>
    <script>
document.querySelector("form").addEventListener("submit", function(e){
    e.preventDefault();

    let email = document.querySelector('input[type="email"]').value;
    let password = document.querySelector('input[type="password"]').value;

    let storedUser = JSON.parse(localStorage.getItem("user"));

    if(storedUser && email === storedUser.email && password === storedUser.password){
        alert("Login Successful!");

        // store logged in user
        localStorage.setItem("loggedInUser", storedUser.name);

        window.location.href = "home.html";
    } else {
        alert("Invalid Email or Password");
    }
});
</script>
</body>
<script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

</html>
